name: Server CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: npm

      - name: Install dependencies
      run: npm ci

      - name: Lint
      run: npm run lint

      - name: Typecheck
      run: npm run typecheck

      - name: Build
      run: npm run build

      - name: Unit tests
      run: npm test -- --runInBand
