name: Front CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: npm

      - name: Install dependencies
      run: npm ci

      - name: Typecheck
      run: npm run typecheck

      - name: Build
      run: npm run build -- --configuration development

      - name: Unit tests
      run: npm run test:ci -- --no-progress
