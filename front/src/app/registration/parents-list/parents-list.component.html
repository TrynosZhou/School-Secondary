<div class="parents-container">
  <mat-toolbar class="parents-toolbar">
    <mat-icon class="title-icon">family_restroom</mat-icon>
    <h1 class="page-title">Manage Parents</h1>
    <span class="spacer"></span>
    <mat-form-field appearance="outline" class="search-field">
      <mat-label>Search parents</mat-label>
      <input
        matInput
        [formControl]="searchControl"
        placeholder="Surname, email, or cell"
      />
      <button
        mat-icon-button
        matSuffix
        type="button"
        *ngIf="searchControl.value"
        (click)="searchControl.setValue('')"
        aria-label="Clear search"
      >
        <mat-icon>close</mat-icon>
      </button>
    </mat-form-field>
    <button
      mat-raised-button
      color="primary"
      (click)="openAddDialog()"
      matTooltip="Add Parent"
    >
      <mat-icon>add</mat-icon>
      Add Parent
    </button>
  </mat-toolbar>

  <div class="loading-container" *ngIf="isLoading">
    <mat-spinner diameter="50"></mat-spinner>
    <p>Loading parents...</p>
  </div>

  <div class="error-container" *ngIf="errorMsg">
    <mat-icon class="error-icon">error</mat-icon>
    <p>{{ errorMsg }}</p>
  </div>

  <div class="table-container mat-elevation-z2" *ngIf="!isLoading && !errorMsg">
    <table mat-table [dataSource]="dataSource" matSort>
      <ng-container matColumnDef="title">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Title</th>
        <td mat-cell *matCellDef="let row">{{ row.title }}</td>
      </ng-container>
      <ng-container matColumnDef="surname">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Surname</th>
        <td mat-cell *matCellDef="let row">{{ row.surname }}</td>
      </ng-container>
      <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Email</th>
        <td mat-cell *matCellDef="let row">{{ row.email }}</td>
      </ng-container>
      <ng-container matColumnDef="cell">
        <th mat-header-cell *matHeaderCellDef>Cell</th>
        <td mat-cell *matCellDef="let row">{{ row.cell }}</td>
      </ng-container>
      <ng-container matColumnDef="linkedStudents">
        <th mat-header-cell *matHeaderCellDef>Linked Students</th>
        <td mat-cell *matCellDef="let row">{{ getLinkedStudentsLabel(row) }}</td>
      </ng-container>
      <ng-container matColumnDef="action">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let row">
          <button mat-icon-button matTooltip="Link students" (click)="openLinkStudentsDialog(row)">
            <mat-icon>link</mat-icon>
          </button>
          <button mat-icon-button matTooltip="Edit" (click)="openEditDialog(row)">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" matTooltip="Delete" (click)="deleteParent(row)">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell" [attr.colspan]="displayedColumns.length">No parents found. Add one to get started.</td>
      </tr>
    </table>
  </div>
</div>
